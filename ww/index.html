<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#f5f1e8" />
<meta name="apple-mobile-web-app-capable" content="yes" />

<title>Ink — A Handwriting Journal</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%23f5f1e8'/%3E%3Ctext x='50' y='72' font-family='Georgia' font-size='70' font-style='italic' text-anchor='middle' fill='%231a2847'%3EI%3C/text%3E%3C/svg%3E" />
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%23f5f1e8'/%3E%3Ctext x='50' y='72' font-family='Georgia' font-size='70' font-style='italic' text-anchor='middle' fill='%231a2847'%3EI%3C/text%3E%3C/svg%3E" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300..700;1,300..700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --paper: #f5f1e8;
    --paper-deep: #ebe4d1;
    --paper-line: #d9cfb6;
    --ink: #1a2847;
    --ink-soft: #4a5670;
    --ink-faint: #8a93a8;
    --accent: #a0522d;
    --accent-warm: #c08a3e;
    --danger: #8b3a3a;
    --rule: rgba(26, 40, 71, 0.08);
    --shadow-soft: 0 1px 2px rgba(26, 40, 71, 0.04), 0 4px 12px rgba(26, 40, 71, 0.06);
    --shadow-lift: 0 2px 4px rgba(26, 40, 71, 0.06), 0 12px 32px rgba(26, 40, 71, 0.12);
    --sidebar-w: 240px;
    --toolbar-h: 60px;
    --serif: "Fraunces", Georgia, serif;
    --sans: "Inter", system-ui, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; overflow: hidden; overscroll-behavior: none; }
  body {
    font-family: var(--sans);
    background: var(--paper);
    color: var(--ink);
    font-size: 14px;
    -webkit-font-smoothing: antialiased;
    user-select: none;
    -webkit-user-select: none;
  }
  .app { display: grid; grid-template-columns: var(--sidebar-w) 1fr; height: 100vh; height: 100dvh; height: var(--app-h, 100dvh); }
  .app.focus-mode { grid-template-columns: 0 1fr; }
  .app.focus-mode .sidebar { transform: translateX(-100%); }

  /* SIDEBAR */
  .sidebar { background: var(--paper-deep); border-right: 1px solid var(--rule); display: flex; flex-direction: column; transition: transform 0.3s ease; overflow: hidden; position: relative; }
  .sidebar-header { padding: 22px 22px 18px; border-bottom: 1px solid var(--rule); }
  .brand { font-family: var(--serif); font-weight: 400; font-style: italic; font-size: 30px; letter-spacing: -0.02em; color: var(--ink); line-height: 1; }
  .brand-sub { font-family: var(--sans); font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--ink-soft); margin-top: 6px; }
  .sidebar-section { padding: 18px 22px 10px; display: flex; justify-content: space-between; align-items: center; }
  .section-label { font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--ink-soft); font-weight: 600; }
  .btn-add { background: none; border: none; color: var(--ink-soft); cursor: pointer; width: 24px; height: 24px; border-radius: 50%; display: grid; place-items: center; font-size: 18px; line-height: 1; transition: all 0.15s; }
  .btn-add:hover, .btn-add:active { background: var(--rule); color: var(--ink); }
  .notebooks { flex: 1; overflow-y: auto; padding: 0 14px 20px; }
  .notebook-item { display: flex; align-items: center; gap: 12px; padding: 10px 12px; border-radius: 6px; cursor: pointer; font-size: 13.5px; color: var(--ink); position: relative; transition: background 0.15s; margin-bottom: 2px; }
  .notebook-item:hover { background: rgba(26, 40, 71, 0.05); }
  .notebook-item.active { background: var(--paper); box-shadow: var(--shadow-soft); font-weight: 500; }
  .notebook-dot { width: 11px; height: 11px; border-radius: 2px; flex-shrink: 0; }
  .notebook-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .notebook-count { font-size: 11px; color: var(--ink-soft); font-variant-numeric: tabular-nums; }
  .notebook-item .btn-delete { background: none; border: none; color: var(--ink-soft); cursor: pointer; font-size: 17px; padding: 4px 8px; opacity: 0.4; border-radius: 4px; transition: opacity 0.15s, background 0.15s; }
  .notebook-item:hover .btn-delete { opacity: 0.7; }
  .notebook-item .btn-delete:hover { opacity: 1; color: var(--danger); background: rgba(139, 26, 26, 0.08); }
  /* On touch devices (no hover), keep delete visible so it's reachable */
  @media (hover: none) { .notebook-item .btn-delete { opacity: 0.55; } }
  .notebook-item .btn-export { background: none; border: none; color: var(--ink-soft); cursor: pointer; font-size: 14px; padding: 4px 8px; opacity: 0.4; border-radius: 4px; transition: opacity 0.15s, background 0.15s; }
  .notebook-item:hover .btn-export { opacity: 0.7; }
  .notebook-item .btn-export:hover { opacity: 1; color: var(--ink); background: rgba(26, 40, 71, 0.08); }
  @media (hover: none) { .notebook-item .btn-export { opacity: 0.55; } }
  /* Sidebar footer */
  .sidebar { display: flex; flex-direction: column; }
  .sidebar-footer { margin-top: auto; padding: 14px 16px; border-top: 1px solid var(--paper-line); }
  .btn-footer { width: 100%; display: flex; align-items: center; gap: 8px; padding: 9px 12px; background: transparent; border: 1px solid var(--paper-line); border-radius: 6px; font-family: var(--sans); font-size: 12.5px; color: var(--ink); cursor: pointer; transition: background 0.15s; }
  .btn-footer:hover { background: rgba(26, 40, 71, 0.05); }
  .footer-icon { font-size: 14px; color: var(--ink-soft); }
  .backup-status { font-size: 10.5px; color: var(--ink-soft); margin-top: 8px; text-align: center; font-style: italic; min-height: 14px; }
  .app-version { font-size: 9.5px; color: var(--ink-soft); opacity: 0.55; text-align: center; margin-top: 10px; font-family: ui-monospace, monospace; cursor: pointer; user-select: none; }
  .app-version:hover { opacity: 1; }
  .empty-state { padding: 30px 20px; text-align: center; color: var(--ink-soft); font-size: 12.5px; font-family: var(--serif); font-style: italic; line-height: 1.5; }

  /* WORKSPACE */
  .workspace { display: flex; flex-direction: column; overflow: hidden; background: var(--paper); position: relative; }

  /* CALENDAR VIEW */
  .calendar-view { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .calendar-view.hidden { display: none; }
  .calendar-header { padding: 28px 36px 20px; display: flex; align-items: flex-end; justify-content: space-between; border-bottom: 1px solid var(--rule); flex-shrink: 0; gap: 20px; }
  .calendar-title-wrap { min-width: 0; flex: 1; }
  .calendar-notebook-label { font-family: var(--sans); font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--ink-soft); margin-bottom: 6px; display: flex; align-items: center; gap: 8px; }
  .calendar-notebook-label .nb-dot { width: 8px; height: 8px; border-radius: 2px; }
  .calendar-title { font-family: var(--serif); font-style: italic; font-weight: 300; font-size: 44px; line-height: 1; color: var(--ink); letter-spacing: -0.02em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .calendar-title .year { font-style: normal; font-weight: 300; color: var(--ink-soft); margin-left: 10px; }
  .calendar-nav { display: flex; gap: 4px; align-items: center; flex-shrink: 0; }
  .cal-nav-btn { width: 36px; height: 36px; border-radius: 50%; border: none; background: transparent; color: var(--ink-soft); cursor: pointer; display: grid; place-items: center; transition: all 0.15s; }
  .cal-nav-btn:hover { background: var(--paper-deep); color: var(--ink); }
  .cal-nav-btn svg { width: 18px; height: 18px; }
  .cal-today-btn { margin-left: 8px; padding: 8px 14px; border-radius: 20px; border: 1px solid var(--paper-line); background: transparent; font-family: var(--sans); font-size: 12px; letter-spacing: 0.06em; text-transform: uppercase; color: var(--ink); cursor: pointer; transition: all 0.15s; font-weight: 500; }
  .cal-today-btn:hover { background: var(--ink); color: var(--paper); border-color: var(--ink); }
  .calendar-weekdays { display: grid; grid-template-columns: repeat(7, 1fr); padding: 16px 36px 10px; gap: 4px; flex-shrink: 0; }
  .weekday { font-family: var(--sans); font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--ink-soft); text-align: center; font-weight: 600; }
  .calendar-grid { flex: 1; display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; padding: 0 36px 36px; overflow: hidden; min-height: 0; }
  .cal-day { background: var(--paper); border: 1px solid var(--rule); border-radius: 4px; padding: 10px; cursor: pointer; transition: all 0.15s; position: relative; display: flex; flex-direction: column; min-height: 80px; overflow: hidden; }
  .cal-day:hover { border-color: var(--ink-soft); background: #fcfaf4; }
  .cal-day.other-month { opacity: 0.3; cursor: default; }
  .cal-day.other-month:hover { border-color: var(--rule); background: var(--paper); }
  .cal-day.today { border-color: var(--ink); border-width: 1.5px; }
  .cal-day.today .day-num { background: var(--ink); color: var(--paper); width: 30px; height: 30px; border-radius: 50%; display: grid; place-items: center; margin-left: -4px; }
  .cal-day.has-entry { background: #fbf7ec; }
  .cal-day.has-entry::after { content: ""; position: absolute; top: 10px; right: 10px; width: 6px; height: 6px; border-radius: 50%; background: var(--accent); }
  .cal-day.today.has-entry::after { background: var(--accent-warm); }
  .day-num { font-family: var(--serif); font-size: 22px; font-weight: 400; color: var(--ink); line-height: 1; letter-spacing: -0.01em; }
  .calendar-empty { padding: 80px 40px; text-align: center; color: var(--ink-soft); }
  .calendar-empty-title { font-family: var(--serif); font-style: italic; font-size: 26px; margin-bottom: 8px; }

  /* HABITS VIEW */
  .habits-view { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .habits-view.hidden { display: none; }
  .habits-header { padding: 28px 36px 20px; display: flex; align-items: flex-end; justify-content: space-between; border-bottom: 1px solid var(--rule); flex-shrink: 0; gap: 20px; }
  .habits-scroll { flex: 1; overflow: auto; padding: 24px 28px 40px; }

  /* Today-first layout — responsive two-column grid.
     Each card needs ~320px minimum for the 7-day strip to fit comfortably.
     auto-fit with minmax gives us 1 column on narrow screens, 2 on wider. */
  .habits-today-date { font-family: var(--serif); font-style: italic; font-size: 22px; color: var(--ink); margin-bottom: 18px; }
  .habits-cards-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 14px; margin-bottom: 18px; }
  .habit-card { background: var(--paper); border: 1px solid var(--rule); border-radius: 10px; padding: 16px 18px; cursor: pointer; transition: all 0.15s; display: flex; flex-direction: column; gap: 12px; }
  .habit-card:hover { border-color: var(--ink-soft); }
  .habit-card.state-done { background: rgba(74, 138, 74, 0.08); border-color: rgba(74, 138, 74, 0.4); }
  .habit-card.state-missed { background: rgba(194, 106, 106, 0.06); border-color: rgba(194, 106, 106, 0.35); }
  .habit-card-top { display: flex; align-items: center; gap: 12px; }
  .habit-card-name { flex: 1; font-size: 16px; font-weight: 500; color: var(--ink); }
  .habit-card-streak { font-size: 12.5px; color: var(--ink-soft); white-space: nowrap; }
  .habit-card-streak.hot { color: var(--accent-warm); font-weight: 600; }
  .habit-card-today { width: 44px; height: 44px; border-radius: 50%; display: grid; place-items: center; font-size: 20px; border: 1.5px solid var(--rule); background: var(--paper); color: var(--ink-soft); transition: all 0.15s; }
  .habit-card.state-done .habit-card-today { background: #4a8a4a; color: white; border-color: #4a8a4a; }
  .habit-card.state-missed .habit-card-today { background: #c26a6a; color: white; border-color: #c26a6a; }
  .habit-card-menu { background: none; border: none; color: var(--ink-soft); cursor: pointer; padding: 4px 6px; font-size: 18px; border-radius: 4px; opacity: 0.5; }
  .habit-card-menu:hover { opacity: 1; background: rgba(26, 40, 71, 0.06); }
  .habit-strip { display: flex; gap: 4px; align-items: center; flex-wrap: nowrap; }
  .habit-strip-label { font-size: 10px; color: var(--ink-soft); letter-spacing: 0.08em; text-transform: uppercase; margin-right: 4px; white-space: nowrap; }
  .habit-strip-cell { width: 24px; height: 24px; border-radius: 4px; display: grid; place-items: center; font-size: 11px; border: 1px solid var(--rule); background: var(--paper); color: var(--ink-soft); flex-shrink: 0; }
  .habit-strip-cell.today { border-color: var(--ink); border-width: 1.5px; }
  .habit-strip-cell.done { background: #4a8a4a; color: white; border-color: #4a8a4a; }
  .habit-strip-cell.missed { background: #c26a6a; color: white; border-color: #c26a6a; }
  .habit-strip-date { font-size: 9px; color: var(--ink-soft); text-align: center; margin-top: 2px; }
  .habit-strip-col { display: flex; flex-direction: column; align-items: center; gap: 2px; }

  .habits-footer-actions { margin-top: 24px; display: flex; justify-content: center; }
  .habits-view-full-btn { padding: 10px 22px; background: transparent; border: 1px solid var(--paper-line); border-radius: 6px; font-family: var(--sans); font-size: 13px; color: var(--ink); cursor: pointer; letter-spacing: 0.02em; }
  .habits-view-full-btn:hover { background: rgba(26, 40, 71, 0.05); }
  .habits-empty { padding: 60px 20px; text-align: center; color: var(--ink-soft); }
  .habits-empty-title { font-family: var(--serif); font-style: italic; font-size: 24px; margin-bottom: 8px; color: var(--ink); }

  /* Overview modal (month + year heat map) */
  .overview-modal { max-width: 720px; width: 95%; }
  .overview-tabs { display: flex; gap: 4px; margin-bottom: 20px; border-bottom: 1px solid var(--rule); }
  .overview-tab { padding: 10px 18px; background: none; border: none; font-family: var(--sans); font-size: 13px; color: var(--ink-soft); cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; font-weight: 500; }
  .overview-tab.active { color: var(--ink); border-bottom-color: var(--ink); }
  .overview-content { max-height: 70vh; overflow-y: auto; }
  .overview-habit-block { margin-bottom: 28px; }
  .overview-habit-header { display: flex; align-items: baseline; gap: 12px; margin-bottom: 10px; }
  .overview-habit-name { font-size: 14px; font-weight: 600; color: var(--ink); }
  .overview-habit-stats { font-size: 11px; color: var(--ink-soft); }
  /* Month view = 7-col calendar grid */
  .overview-month-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; max-width: 380px; }
  .overview-month-weekday { font-size: 9px; color: var(--ink-soft); text-align: center; letter-spacing: 0.05em; text-transform: uppercase; padding-bottom: 4px; }
  .overview-month-cell { aspect-ratio: 1; border-radius: 4px; display: grid; place-items: center; font-size: 11px; border: 1px solid var(--rule); background: var(--paper); color: var(--ink-soft); }
  .overview-month-cell.done { background: #4a8a4a; color: white; border-color: #4a8a4a; }
  .overview-month-cell.missed { background: #c26a6a; color: white; border-color: #c26a6a; }
  .overview-month-cell.today { outline: 1.5px solid var(--ink); outline-offset: -2px; }
  .overview-month-cell.empty { visibility: hidden; }
  /* Year view = GitHub-style heat map: rows=weekdays, cols=weeks */
  .overview-year-wrap { overflow-x: auto; padding-bottom: 8px; }
  .overview-year-grid { display: grid; grid-template-rows: repeat(7, 14px); grid-auto-flow: column; grid-auto-columns: 14px; gap: 3px; }
  .overview-year-cell { background: var(--paper); border: 1px solid var(--rule); border-radius: 3px; }
  .overview-year-cell.done { background: #4a8a4a; border-color: #4a8a4a; }
  .overview-year-cell.missed { background: #c26a6a; border-color: #c26a6a; }
  .overview-year-cell.today { outline: 1.5px solid var(--ink); outline-offset: -2px; }
  .overview-year-cell.future { opacity: 0.15; }
  .overview-year-months { display: flex; font-size: 10px; color: var(--ink-soft); margin-top: 6px; gap: 0; letter-spacing: 0.03em; }
  .overview-legend { display: flex; gap: 16px; margin-top: 16px; font-size: 11px; color: var(--ink-soft); align-items: center; justify-content: center; flex-wrap: wrap; }
  .overview-legend-item { display: flex; align-items: center; gap: 6px; }
  .overview-legend-swatch { width: 14px; height: 14px; border-radius: 3px; border: 1px solid var(--rule); }

  /* WRITING VIEW */
  .writing-view { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .writing-view.hidden { display: none; }
  .toolbar { height: var(--toolbar-h); background: var(--paper); border-bottom: 1px solid var(--rule); display: flex; align-items: center; padding: 0 14px; gap: 12px; flex-shrink: 0; z-index: 10; }
  .tool-group { display: flex; align-items: center; gap: 6px; padding: 0 6px; border-right: 1px solid var(--rule); height: 32px; }
  .tool-group:last-of-type { border-right: none; }
  .tool-btn { background: transparent; border: none; width: 42px; height: 38px; border-radius: 6px; cursor: pointer; display: grid; place-items: center; color: var(--ink-soft); transition: all 0.12s; padding: 0; }
  .tool-btn:hover { background: rgba(26, 40, 71, 0.06); color: var(--ink); }
  .tool-btn.active { background: rgba(26, 40, 71, 0.1); color: var(--ink); }
  .tool-btn:disabled { opacity: 0.3; cursor: not-allowed; }
  .tool-btn svg { width: 20px; height: 20px; }
  .color-swatch { width: 28px; height: 28px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: transform 0.15s; padding: 0; box-shadow: inset 0 0 0 1px rgba(26, 40, 71, 0.12); }
  .color-swatch:hover { transform: scale(1.1); }
  .color-swatch.active { border-color: var(--ink); transform: scale(1.15); box-shadow: 0 0 0 2px var(--paper), 0 0 0 3px var(--ink), inset 0 0 0 1px rgba(26, 40, 71, 0.12); }
  .thickness-wrap { display: flex; align-items: center; gap: 8px; padding: 0 6px; }
  .thickness-btn { background: transparent; border: none; width: 36px; height: 36px; border-radius: 6px; cursor: pointer; display: grid; place-items: center; transition: all 0.12s; padding: 0; }

  /* ---- Color trigger (current color + caret in toolbar) ---- */
  .color-trigger { display: flex; align-items: center; gap: 5px; padding: 4px 8px 4px 6px; border-radius: 6px; border: none; background: transparent; cursor: pointer; transition: background 0.15s; height: 36px; }
  .color-trigger:hover { background: rgba(26, 40, 71, 0.06); }
  .current-swatch { display: block; width: 26px; height: 26px; border-radius: 50%; box-shadow: inset 0 0 0 1px rgba(26, 40, 71, 0.15); background: var(--ink); }
  .dropdown-caret { width: 12px; height: 12px; color: var(--ink-soft); flex-shrink: 0; }

  /* ---- Color popover ---- */
  .color-popover { position: fixed; display: none; background: var(--paper); border: 1px solid var(--rule); border-radius: 10px; padding: 12px; box-shadow: var(--shadow-lift); z-index: 80; }
  .color-popover.show { display: grid; grid-template-columns: repeat(8, auto); gap: 8px; }
  .popover-swatch { width: 36px; height: 36px; border-radius: 50%; border: 2px solid transparent; cursor: pointer; padding: 0; box-shadow: inset 0 0 0 1px rgba(26, 40, 71, 0.12); transition: transform 0.1s; }
  .popover-swatch:hover { transform: scale(1.08); }
  .popover-swatch.active { border-color: var(--ink); box-shadow: 0 0 0 2px var(--paper), 0 0 0 3px var(--ink), inset 0 0 0 1px rgba(26, 40, 71, 0.12); }
  @media (max-width: 600px) {
    .color-popover.show { grid-template-columns: repeat(4, auto); }
  }
  .thickness-btn:hover { background: rgba(26, 40, 71, 0.06); }
  .thickness-btn.active { background: rgba(26, 40, 71, 0.1); }
  .thickness-dot { background: var(--ink); border-radius: 50%; }
  .toolbar-spacer { flex: 1; }
  .page-title-display { font-family: var(--serif); font-style: italic; font-size: 17px; color: var(--ink); padding: 0 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 340px; }
  .palm-toggle { display: flex; align-items: center; gap: 8px; font-size: 10px; color: var(--ink-soft); letter-spacing: 0.1em; padding: 0 8px; cursor: pointer; font-weight: 600; }
  .palm-toggle input { appearance: none; width: 28px; height: 16px; border-radius: 8px; background: var(--paper-line); position: relative; cursor: pointer; transition: background 0.2s; }
  .palm-toggle input::after { content: ""; position: absolute; top: 2px; left: 2px; width: 12px; height: 12px; border-radius: 50%; background: white; transition: transform 0.2s; box-shadow: 0 1px 2px rgba(0,0,0,0.2); }
  .palm-toggle input:checked { background: var(--ink); }
  .palm-toggle input:checked::after { transform: translateX(12px); }

  /* CANVAS — infinite scroll */
  .canvas-container { flex: 1; overflow: hidden; background: var(--paper-deep); padding: 16px; position: relative; display: flex; }
  .canvas-scroll { flex: 1; overflow: auto; background: var(--paper); box-shadow: var(--shadow-lift); border-radius: 2px; position: relative; -webkit-overflow-scrolling: touch; }
  .canvas-spacer { position: relative; }
  canvas { display: block; position: sticky; top: 0; left: 0; touch-action: none; cursor: crosshair; background: transparent; }
  #canvas-bg { pointer-events: none; }
  #canvas-ink { pointer-events: none; margin-top: calc(var(--canvas-vh, 0px) * -1); }
  #canvas { margin-top: calc(var(--canvas-vh, 0px) * -1); }  /* overlay stacks over bg + ink */
  /* scrollbar styling */
  .canvas-scroll::-webkit-scrollbar { width: 10px; height: 10px; }
  .canvas-scroll::-webkit-scrollbar-track { background: transparent; }
  .canvas-scroll::-webkit-scrollbar-thumb { background: var(--sb-thumb, rgba(26, 40, 71, 0.15)); border-radius: 5px; border: 2px solid transparent; background-clip: padding-box; }
  .canvas-scroll::-webkit-scrollbar-thumb:hover { background: var(--sb-thumb-hover, rgba(26, 40, 71, 0.3)); background-clip: padding-box; }

  /* MODAL */
  .modal-bg { position: fixed; inset: 0; background: rgba(26, 40, 71, 0.35); display: none; place-items: center; z-index: 100; backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px); }
  .modal-bg.show { display: grid; }
  .modal { background: var(--paper); border-radius: 8px; padding: 26px; width: 90%; max-width: 440px; max-height: 90vh; overflow-y: auto; box-shadow: var(--shadow-lift); }
  .modal-title { font-family: var(--serif); font-size: 24px; margin-bottom: 14px; font-weight: 400; font-style: italic; }
  .modal-field-label { font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--ink-soft); font-weight: 600; margin: 14px 0 8px; }
  .option-grid { display: grid; gap: 8px; margin-bottom: 4px; }
  .option-grid.cols-2 { grid-template-columns: 1fr 1fr; }
  .option-grid.cols-3 { grid-template-columns: 1fr 1fr 1fr; }
  .opt-btn { background: white; border: 1.5px solid var(--paper-line); border-radius: 6px; padding: 10px 8px; cursor: pointer; font-family: var(--sans); color: var(--ink); display: flex; flex-direction: column; align-items: center; gap: 4px; transition: all 0.15s; }
  .opt-btn:hover { border-color: var(--ink-soft); }
  .opt-btn.sel { border-color: var(--ink); background: #fbf7ec; }
  .opt-icon { color: var(--ink-soft); width: 22px; height: 22px; margin: 2px 0; }
  .opt-btn.sel .opt-icon { color: var(--ink); }
  .opt-icon svg { width: 100%; height: 100%; }
  .opt-label { font-size: 12.5px; font-weight: 500; }
  .opt-sub { font-size: 10px; color: var(--ink-soft); letter-spacing: 0.02em; }
  .opt-preview { width: 100%; height: 36px; border-radius: 3px; border: 1px solid var(--paper-line); }
  .format-ruled { background: repeating-linear-gradient(to bottom, #f5f1e8 0 7px, rgba(26,40,71,0.25) 7px 8px); }
  .format-blank { background: #f5f1e8; }
  .format-dotted { background: #f5f1e8; background-image: radial-gradient(rgba(26,40,71,0.35) 1px, transparent 1px); background-size: 8px 8px; }
  .modal-input { width: 100%; padding: 10px 12px; border: 1px solid var(--paper-line); background: white; border-radius: 4px; font-family: var(--sans); font-size: 14px; color: var(--ink); margin-bottom: 14px; }
  .modal-input:focus { outline: 2px solid var(--ink); outline-offset: -1px; border-color: var(--ink); }
  .color-picker { display: grid; grid-template-columns: repeat(8, 1fr); gap: 8px; margin-bottom: 18px; }
  .color-picker button { aspect-ratio: 1; border-radius: 6px; border: 2px solid transparent; cursor: pointer; }
  .color-picker button.sel { border-color: var(--ink); }
  .modal-actions { display: flex; gap: 10px; justify-content: flex-end; }
  .modal-btn { padding: 9px 20px; border: 1px solid var(--paper-line); background: transparent; border-radius: 4px; font-family: var(--sans); font-size: 13px; color: var(--ink); cursor: pointer; font-weight: 500; }
  .modal-btn.primary { background: var(--ink); color: var(--paper); border-color: var(--ink); }
  .modal-btn:hover { background: rgba(26, 40, 71, 0.06); }
  .modal-btn.primary:hover { background: #243557; }

  /* TOAST */
  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(100px); background: var(--ink); color: var(--paper); padding: 10px 20px; border-radius: 6px; font-size: 13px; box-shadow: var(--shadow-lift); transition: transform 0.3s; z-index: 200; }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* RESPONSIVE */
  @media (max-width: 900px) {
    /* Simple, robust mobile layout: workspace fills the viewport, sidebar is a
       fixed-position overlay that slides in from the left. No CSS grid tricks. */
    .app { display: block; position: relative; }
    .workspace { position: absolute; inset: 0; display: flex; flex-direction: column; }
    .sidebar {
      position: fixed; top: 0; left: 0; bottom: 0;
      width: 280px; max-width: 82vw;
      transform: translateX(-100%);
      transition: transform 0.25s ease;
      z-index: 50;
    }
    .app.sidebar-open .sidebar { transform: translateX(0); box-shadow: var(--shadow-lift); }
    /* Dim backdrop behind open sidebar */
    .app.sidebar-open::before {
      content: ""; position: fixed; inset: 0; background: rgba(26,40,71,0.35);
      z-index: 40;
    }
    .canvas-container { padding: 8px; }
    .calendar-header { padding: 22px 22px 16px; }
    .calendar-title { font-size: 32px; }
    .calendar-weekdays { padding: 12px 22px 8px; }
    .calendar-grid { padding: 0 22px 22px; }
    .cal-day { min-height: 62px; padding: 8px; }
    .day-num { font-size: 18px; }
    .page-title-display { max-width: 180px; font-size: 15px; }
    .palm-toggle { font-size: 9px; }
  }
  .notebooks::-webkit-scrollbar { width: 6px; }
  .notebooks::-webkit-scrollbar-thumb { background: rgba(26, 40, 71, 0.15); border-radius: 3px; }

<!-- Capacitor inserts the native bridge at runtime when running as a native app.
     This script tag references it; in a browser it 404s harmlessly. -->
<script src="capacitor.js" onerror="void 0"></script>

<script>
/* ---- Native (Capacitor) integration ----
   This block only does anything if the page is running inside the Capacitor
   native shell. In a browser it's a no-op.

   What it does:
   1. Sets `window.__INK_NATIVE__ = true` so other code can detect native mode
      and hide things like the "force update" tap (which is irrelevant when
      there's no service worker / cache).
   2. Wires the Android hardware back button to sensible behavior:
        - close open modals first
        - then leave writing view → calendar/habits
        - then exit the app
*/
(function installNativeBridge(){
  if (!window.Capacitor || !window.Capacitor.isNativePlatform || !window.Capacitor.isNativePlatform()) return;
  window.__INK_NATIVE__ = true;

  const App = (window.Capacitor.Plugins && window.Capacitor.Plugins.App) || null;
  if (!App || !App.addListener) return;

  App.addListener('backButton', () => {
    const openModals = document.querySelectorAll('.modal-bg.show');
    if (openModals.length > 0) {
      openModals[openModals.length - 1].classList.remove('show');
      return;
    }
    const cp = document.getElementById('color-popover');
    if (cp && cp.classList.contains('show')) {
      cp.classList.remove('show');
      return;
    }
    const wv = document.getElementById('writing-view');
    if (wv && !wv.classList.contains('hidden')) {
      const backBtn = document.getElementById('btn-back');
      if (backBtn && backBtn.offsetParent !== null) { backBtn.click(); return; }
    }
    const app = document.getElementById('app');
    if (app && app.classList.contains('sidebar-open')) {
      app.classList.remove('sidebar-open');
      return;
    }
    if (App.exitApp) App.exitApp();
  });
})();
</script>

<script>
/* ---- Visible error overlay (debug aid) ----
   Any uncaught error or unhandled promise rejection becomes a red banner at
   the top of the page. Invaluable on tablets where devtools isn't easy to open.
   Tap the banner to dismiss it.
*/
(function installErrorOverlay(){
  const show = (msg) => {
    const id = '__err_overlay__';
    let el = document.getElementById(id);
    if (!el) {
      el = document.createElement('div');
      el.id = id;
      el.style.cssText = 'position:fixed;top:0;left:0;right:0;z-index:99999;background:#8b1a1a;color:#fff;padding:10px 14px;font:12px/1.4 ui-monospace,monospace;white-space:pre-wrap;max-height:50vh;overflow:auto;border-bottom:2px solid #000;';
      el.addEventListener('click', () => el.remove());
      const attach = () => document.body ? document.body.appendChild(el) : setTimeout(attach, 50);
      attach();
    }
    el.textContent = (el.textContent ? el.textContent + '\n\n' : '') + msg + '\n(tap to dismiss)';
  };
  window.addEventListener('error', (e) => {
    show('ERROR: ' + (e.message || e.error || 'unknown') + '\n  at ' + (e.filename || '?') + ':' + (e.lineno || '?') + ':' + (e.colno || '?'));
  });
  window.addEventListener('unhandledrejection', (e) => {
    const r = e.reason || {};
    show('PROMISE REJECTED: ' + (r.message || r.toString() || 'unknown'));
  });
})();

/* ---- Boot diagnostic bar ----
   Shows runtime state in the top-right corner using inline styles so it
   survives CSS failures. Tap to dismiss. Auto-hides after 30s.
*/
(function installBootDiag(){
  const el = document.createElement('div');
  el.id = '__boot_diag__';
  el.style.cssText = 'position:fixed;top:0;right:0;z-index:99998;background:rgba(0,0,0,0.82);color:#6fffa0;padding:6px 10px;font:10px/1.35 ui-monospace,monospace;border-bottom-left-radius:6px;pointer-events:auto;max-width:82vw;max-height:60vh;overflow:auto;white-space:pre;border-left:2px solid #000;border-bottom:2px solid #000;';

  let lastPenEvent = 'none';
  let lastPenTs = 0;

  function dims(node) {
    return node ? `${Math.round(node.clientWidth)}×${Math.round(node.clientHeight)}` : '?';
  }

  function update() {
    const w = window.innerWidth, h = window.innerHeight;
    const orient = w > h ? 'L' : 'P';
    const appH = document.documentElement.style.getPropertyValue('--app-h') || '(unset)';
    const appEl = document.getElementById('app');
    const ws = document.querySelector('.workspace');
    const cv = document.getElementById('calendar-view');
    const wv = document.getElementById('writing-view');

    // Access module-scope state defensively (may not be declared yet during boot).
    let tcount = '?', pActive = '?', tPanStr = '?';
    try { tcount = activeTouches.size; } catch (_) {}
    try { pActive = penActive ? 'Y' : 'N'; } catch (_) {}
    try { tPanStr = touchPan ? 'Y' : 'N'; } catch (_) {}

    const cvHidden = cv ? cv.classList.contains('hidden') : '?';
    const wvHidden = wv ? wv.classList.contains('hidden') : '?';

    el.textContent = [
      `ink · ${w}×${h} ${orient} | appH:${appH}`,
      `app:${dims(appEl)}  ws:${dims(ws)}`,
      `cal:${dims(cv)} (hid:${cvHidden})  wri:${dims(wv)} (hid:${wvHidden})`,
      `touches:${tcount}  pan:${tPanStr}  penActive:${pActive}`,
      `lastPen: ${lastPenEvent}`
    ].join('\n');
  }

  // Track pen events globally so we can display their raw properties.
  window.addEventListener('pointerdown', (e) => {
    if (e.pointerType === 'pen') {
      lastPenEvent = `down btn=${e.button} btns=${e.buttons} p=${(e.pressure||0).toFixed(2)} w=${e.width||0} h=${e.height||0}`;
      lastPenTs = Date.now();
      update();
    } else if (e.pointerType === 'touch') {
      // also note touch events briefly, helps distinguish palm/finger
    }
  }, true);
  window.addEventListener('pointermove', (e) => {
    if (e.pointerType === 'pen' && e.buttons !== 0) {
      // Only log during active strokes to avoid spam from hover
      if (Date.now() - lastPenTs > 250) {
        lastPenEvent = `move btn=${e.button} btns=${e.buttons} p=${(e.pressure||0).toFixed(2)}`;
        lastPenTs = Date.now();
      }
    }
  }, true);

  const attach = () => {
    if (!document.body) { setTimeout(attach, 50); return; }
    document.body.appendChild(el);
  };
  update();
  attach();
  el.addEventListener('click', () => el.remove());
  window.addEventListener('resize', update);
  window.addEventListener('orientationchange', update);
  setInterval(update, 500);
  // Auto-hide after 30s so it doesn't clutter normal use
  setTimeout(() => { try { el.remove(); } catch (_) {} }, 30000);
})();

/* ---- Reliable viewport height (orientation-safe) ----
   `100dvh` is unreliable on some mobile browsers (especially Samsung Internet
   during orientation changes — can report 0, leaving the app invisible). We
   set `--app-h` from `window.innerHeight` and refresh it on every resize /
   orientation change. CSS falls back to 100dvh / 100vh if the variable is
   missing.
*/
(function installViewportHeight(){
  function setAppHeight() {
    const h = window.innerHeight;
    if (h > 0) document.documentElement.style.setProperty('--app-h', h + 'px');
  }
  setAppHeight();
  window.addEventListener('resize', setAppHeight);
  window.addEventListener('orientationchange', () => {
    // After an orientation change, the viewport often settles a tick later.
    // Re-set at several intervals to catch whichever moment is "right".
    setAppHeight();
    setTimeout(setAppHeight, 100);
    setTimeout(setAppHeight, 300);
    setTimeout(setAppHeight, 600);
  });
  // Also refresh when the app regains focus (covers returning from background
  // with a different orientation than when it was paused).
  document.addEventListener('visibilitychange', () => {
    if (!document.hidden) setAppHeight();
  });
})();
</script>

const $ = (s) => document.querySelector(s);
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
function escapeHTML(s) { return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function toast(msg) { const t = $('#toast'); t.textContent = msg; t.classList.add('show'); clearTimeout(toast._t); toast._t = setTimeout(() => t.classList.remove('show'), 1800); }

// Promise-based confirm dialog. Replaces the browser's confirm() which can be
// blocked or styled poorly in installed PWAs.
// Usage: if (await confirmDialog({ title, message, okLabel })) { ... }
function confirmDialog({ title = 'Confirm', message = '', okLabel = 'Delete' } = {}) {
  return new Promise((resolve) => {
    const bg = $('#confirm-modal');
    $('#confirm-title').textContent = title;
    $('#confirm-message').textContent = message;
    $('#confirm-ok').textContent = okLabel;
    bg.classList.add('show');
    const cleanup = (result) => {
      bg.classList.remove('show');
      $('#confirm-ok').removeEventListener('click', ok);
      $('#confirm-cancel').removeEventListener('click', cancel);
      bg.removeEventListener('click', bgClick);
      resolve(result);
    };
    const ok = () => cleanup(true);
    const cancel = () => cleanup(false);
    const bgClick = (e) => { if (e.target === bg) cleanup(false); };
    $('#confirm-ok').addEventListener('click', ok);
    $('#confirm-cancel').addEventListener('click', cancel);
    bg.addEventListener('click', bgClick);
  });
}

// Promise-based prompt dialog for text input.
// Usage: const name = await promptDialog({ title, placeholder, initial, okLabel });
// Returns the trimmed string, or null if cancelled.
function promptDialog({ title = 'Input', placeholder = '', initial = '', okLabel = 'OK' } = {}) {
  return new Promise((resolve) => {
    const bg = $('#prompt-modal');
    const input = $('#prompt-input');
    $('#prompt-title').textContent = title;
    input.placeholder = placeholder;
    input.value = initial;
    $('#prompt-ok').textContent = okLabel;
    bg.classList.add('show');
    setTimeout(() => input.focus(), 80);
    const cleanup = (result) => {
      bg.classList.remove('show');
      $('#prompt-ok').removeEventListener('click', ok);
      $('#prompt-cancel').removeEventListener('click', cancel);
      bg.removeEventListener('click', bgClick);
      input.removeEventListener('keydown', onKey);
      resolve(result);
    };
    const ok = () => { const v = input.value.trim(); cleanup(v || null); };
    const cancel = () => cleanup(null);
    const bgClick = (e) => { if (e.target === bg) cleanup(null); };
    const onKey = (e) => {
      if (e.key === 'Enter') { e.preventDefault(); ok(); }
      else if (e.key === 'Escape') { e.preventDefault(); cancel(); }
    };
    $('#prompt-ok').addEventListener('click', ok);
    $('#prompt-cancel').addEventListener('click', cancel);
    bg.addEventListener('click', bgClick);
    input.addEventListener('keydown', onKey);
  });
}

// Promise-based action sheet — vertical list of buttons.
// Usage: const choice = await actionDialog({ title, actions: [{label, value, destructive?}] })
// Returns the `value` of the chosen action, or null if cancelled.
function actionDialog({ title = 'Options', actions = [] } = {}) {
  return new Promise((resolve) => {
    const bg = $('#action-modal');
    const list = $('#action-list');
    $('#action-title').textContent = title;
    list.innerHTML = '';
    const cleanup = (result) => {
      bg.classList.remove('show');
      $('#action-cancel').removeEventListener('click', cancel);
      bg.removeEventListener('click', bgClick);
      resolve(result);
    };
    const cancel = () => cleanup(null);
    const bgClick = (e) => { if (e.target === bg) cleanup(null); };
    for (const a of actions) {
      const btn = document.createElement('button');
      btn.className = 'modal-btn' + (a.destructive ? ' primary' : '');
      btn.textContent = a.label;
      if (a.destructive) { btn.style.background = 'var(--danger)'; btn.style.borderColor = 'var(--danger)'; }
      btn.addEventListener('click', () => cleanup(a.value));
      list.appendChild(btn);
    }
    $('#action-cancel').addEventListener('click', cancel);
    bg.addEventListener('click', bgClick);
    bg.classList.add('show');
  });
}

function dateKey(d) {
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}
function parseDateKey(k) { const [y, m, d] = k.split('-').map(Number); return new Date(y, m - 1, d); }
function isSameDay(a, b) { return a.getFullYear() === b.getFullYear() && a.getMonth() === b.getMonth() && a.getDate() === b.getDate(); }

/* ---------- IndexedDB ---------- */
function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open('InkJournalDB', 2);
    req.onupgradeneeded = (e) => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains('notebooks')) {
        db.createObjectStore('notebooks', { keyPath: 'id' });
      }
      let pagesStore;
      if (!db.objectStoreNames.contains('pages')) {
        pagesStore = db.createObjectStore('pages', { keyPath: 'id' });
        pagesStore.createIndex('notebookId', 'notebookId', { unique: false });
        pagesStore.createIndex('nb_date', ['notebookId', 'dateKey'], { unique: true });
      } else {
        pagesStore = e.target.transaction.objectStore('pages');
        if (!pagesStore.indexNames.contains('nb_date')) {
          pagesStore.createIndex('nb_date', ['notebookId', 'dateKey'], { unique: false });
        }
      }
    };
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}
function txReq(store, mode, fn) {
  return new Promise((resolve, reject) => {
    const tx = state.db.transaction(store, mode);
    const s = tx.objectStore(store);
    const r = fn(s);
    if (r && 'onsuccess' in r) {
      r.onsuccess = () => resolve(r.result);
      r.onerror = () => reject(r.error);
    } else {
      tx.oncomplete = () => resolve();
      tx.onerror = () => reject(tx.error);
    }
  });
}
const DB = {
  allNotebooks: () => txReq('notebooks', 'readonly', s => s.getAll()),
  putNotebook: (n) => txReq('notebooks', 'readwrite', s => s.put(n)),
  deleteNotebook: (id) => txReq('notebooks', 'readwrite', s => s.delete(id)),
  getPageByDate: (notebookId, dk) => new Promise((resolve, reject) => {
    const tx = state.db.transaction('pages', 'readonly');
    const idx = tx.objectStore('pages').index('nb_date');
    const req = idx.get([notebookId, dk]);
    req.onsuccess = () => resolve(req.result || null);
    req.onerror = () => reject(req.error);
  }),
  putPage: (p) => txReq('pages', 'readwrite', s => s.put(p)),
  deletePage: (id) => txReq('pages', 'readwrite', s => s.delete(id)),
  allPagesIn: (notebookId) => new Promise((resolve, reject) => {
    const tx = state.db.transaction('pages', 'readonly');
    const idx = tx.objectStore('pages').index('notebookId');
    const req = idx.getAll(notebookId);
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  }),
  pagesInMonth: (notebookId, year, month) => new Promise((resolve, reject) => {
    const start = `${year}-${String(month+1).padStart(2,'0')}-01`;
    const endMonth = month === 11 ? 0 : month + 1;
    const endYear = month === 11 ? year + 1 : year;
    const end = `${endYear}-${String(endMonth+1).padStart(2,'0')}-01`;
    const tx = state.db.transaction('pages', 'readonly');
    const idx = tx.objectStore('pages').index('nb_date');
    const range = IDBKeyRange.bound([notebookId, start], [notebookId, end], false, true);
    const req = idx.getAll(range);
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  })
};

/* ---------- Export / Backup ----------
   JSON backups preserve the exact IndexedDB structure so they can be imported
   back cleanly later. Format:

   Single notebook:
     { version: 1, exportedAt: <ms>, type: 'notebook',
       notebook: {...}, pages: [...] }

   Full backup (all notebooks):
     { version: 1, exportedAt: <ms>, type: 'full',
       notebooks: [ { ...notebook fields..., pages: [...] }, ... ] }

   Auto-backup runs when the app loads and ≥7 days have passed since the last
   backup. The timestamp is stored in localStorage (survives app restarts,
   survives redeploys, does NOT survive uninstall).
*/
const BACKUP_INTERVAL_MS = 7 * 24 * 60 * 60 * 1000; // 7 days
const BACKUP_TS_KEY = 'ink.lastBackupTime';

function downloadJSON(filename, data) {
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  a.style.display = 'none';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  // Give the browser a moment to start the download before revoking the URL
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

function safeName(s) {
  return String(s).replace(/[^a-z0-9_-]+/gi, '-').replace(/^-+|-+$/g, '').slice(0, 40) || 'notebook';
}

function dateStamp(d = new Date()) {
  // YYYY-MM-DD for filenames
  return d.getFullYear() + '-' +
    String(d.getMonth() + 1).padStart(2, '0') + '-' +
    String(d.getDate()).padStart(2, '0');
}

async function exportNotebook(nb) {
  const pages = await DB.allPagesIn(nb.id);
  pages.sort((a, b) => (a.dateKey || '').localeCompare(b.dateKey || '') || a.createdAt - b.createdAt);
  const payload = {
    version: 1,
    exportedAt: Date.now(),
    type: 'notebook',
    notebook: nb,
    pages: pages
  };
  const fname = `ink-${safeName(nb.name)}-${dateStamp()}.json`;
  downloadJSON(fname, payload);
}

async function exportAllNotebooks() {
  const notebooks = [];
  for (const nb of state.notebooks) {
    const pages = await DB.allPagesIn(nb.id);
    pages.sort((a, b) => (a.dateKey || '').localeCompare(b.dateKey || '') || a.createdAt - b.createdAt);
    notebooks.push({ ...nb, pages });
  }
  const payload = {
    version: 1,
    exportedAt: Date.now(),
    type: 'full',
    notebooks: notebooks
  };
  const fname = `ink-backup-${dateStamp()}.json`;
  downloadJSON(fname, payload);
  // Record the timestamp so auto-backup spacing works.
  try { localStorage.setItem(BACKUP_TS_KEY, String(Date.now())); } catch (_) {}
  updateBackupStatus();
}

function updateBackupStatus() {
  const el = $('#backup-status');
  if (!el) return;
  let ts = 0;
  try { ts = parseInt(localStorage.getItem(BACKUP_TS_KEY) || '0', 10); } catch (_) {}
  if (!ts) {
    el.textContent = 'No backup yet';
    return;
  }
  const days = Math.floor((Date.now() - ts) / (24 * 60 * 60 * 1000));
  if (days === 0) el.textContent = 'Backed up today';
  else if (days === 1) el.textContent = 'Backed up yesterday';
  else el.textContent = `Backed up ${days} days ago`;
}

async function maybeAutoBackup() {
  // Don't try to back up if there are no notebooks yet.
  if (!state.notebooks || state.notebooks.length === 0) {
    // Still stamp the timestamp so we don't count the first empty launch as "overdue forever"
    try { if (!localStorage.getItem(BACKUP_TS_KEY)) localStorage.setItem(BACKUP_TS_KEY, String(Date.now())); } catch (_) {}
    updateBackupStatus();
    return;
  }
  let ts = 0;
  try { ts = parseInt(localStorage.getItem(BACKUP_TS_KEY) || '0', 10); } catch (_) {}
  // First ever run: set the baseline so auto-backup fires 7 days from now,
  // not immediately on first use.
  if (!ts) {
    try { localStorage.setItem(BACKUP_TS_KEY, String(Date.now())); } catch (_) {}
    updateBackupStatus();
    return;
  }
  const age = Date.now() - ts;
  if (age >= BACKUP_INTERVAL_MS) {
    try {
      await exportAllNotebooks();
      toast('Weekly backup downloaded');
    } catch (err) {
      console.error('Auto-backup failed', err);
      toast('Auto-backup failed — try manually');
    }
  } else {
    updateBackupStatus();
  }
}

/* ---------- Sidebar ---------- */
function renderNotebooks() {
  const list = $('#notebooks');
  list.innerHTML = '';
  if (state.notebooks.length === 0) {
    list.innerHTML = '<div class="empty-state">No notebooks yet.<br>Tap + to begin<br>your journal.</div>';
    return;
  }
  state.notebooks.forEach(nb => {
    const el = document.createElement('div');
    el.className = 'notebook-item' + (nb.id === state.currentNotebookId ? ' active' : '');
    el.innerHTML = `
      <span class="notebook-dot" style="background:${nb.color}"></span>
      <span class="notebook-name">${escapeHTML(nb.name)}</span>
      <span class="notebook-count">${nb.pageCount || 0}</span>
      <button class="btn-export" title="Export notebook as JSON">↓</button>
      <button class="btn-delete" title="Delete notebook">×</button>
    `;
    el.addEventListener('click', (e) => {
      // Ignore clicks on the in-item action buttons
      if (e.target.closest('.btn-delete') || e.target.closest('.btn-export')) return;
      selectNotebook(nb.id);
      if (window.innerWidth <= 900) $('#app').classList.remove('sidebar-open');
    });
    el.querySelector('.btn-export').addEventListener('click', async (e) => {
      e.stopPropagation();
      try {
        await exportNotebook(nb);
        toast(`"${nb.name}" exported`);
      } catch (err) {
        toast('Export failed');
        console.error(err);
      }
    });
    el.querySelector('.btn-delete').addEventListener('click', async (e) => {
      e.stopPropagation();
      const ok = await confirmDialog({
        title: 'Delete notebook?',
        message: `"${nb.name}" and all its entries will be permanently deleted. This cannot be undone.`,
        okLabel: 'Delete'
      });
      if (!ok) return;
      const pages = await DB.allPagesIn(nb.id);
      for (const p of pages) await DB.deletePage(p.id);
      await DB.deleteNotebook(nb.id);
      if (state.currentNotebookId === nb.id) {
        state.currentNotebookId = null;
        state.currentPage = null;
      }
      await loadNotebooks();
      renderNotebooks();
      if (!state.currentNotebookId && state.notebooks.length > 0) {
        selectNotebook(state.notebooks[0].id);
      } else {
        await loadMonthEntries();
        renderCalendar();
        showView('calendar');
      }
      toast('Notebook deleted');
    });
    list.appendChild(el);
  });
}
async function loadNotebooks() {
  const nbs = await DB.allNotebooks();
  nbs.sort((a, b) => a.createdAt - b.createdAt);
  for (const nb of nbs) {
    // backfill defaults for notebooks created before these fields existed
    if (!nb.type) nb.type = 'calendar';
    if (!nb.pageFormat) nb.pageFormat = 'ruled';
    if (!nb.pageColor) nb.pageColor = 'paper';
    // habits notebooks store their data directly on the notebook record
    if (nb.type === 'habits') {
      if (!Array.isArray(nb.habits)) nb.habits = [];
      if (!nb.entries || typeof nb.entries !== 'object') nb.entries = {};
      nb.pageCount = nb.habits.length;
    } else {
      const ps = await DB.allPagesIn(nb.id);
      nb.pageCount = ps.length;
    }
  }
  state.notebooks = nbs;
}
async function selectNotebook(id) {
  await flushSave();
  state.currentNotebookId = id;
  state.currentPage = null;
  renderNotebooks();
  const nb = state.notebooks.find(n => n.id === id);
  if (nb && nb.type === 'habits') {
    if (!state.habitsViewMonth) state.habitsViewMonth = new Date();
    renderHabits();
    showView('habits');
  } else if (nb && nb.type === 'simple') {
    // simple notebook: open the single page directly
    await openSimpleNotebookPage();
  } else {
    await loadMonthEntries();
    renderCalendar();
    showView('calendar');
  }
  applyPageTheme();
}

function currentNotebook() {
  return state.notebooks.find(n => n.id === state.currentNotebookId) || null;
}

function currentPageTheme() {
  const nb = currentNotebook();
  const colorKey = (nb && nb.pageColor) || 'paper';
  return PAGE_COLORS[colorKey] || PAGE_COLORS.paper;
}

function currentPageFormat() {
  const nb = currentNotebook();
  return (nb && nb.pageFormat) || 'ruled';
}

function applyPageTheme() {
  const theme = currentPageTheme();
  scrollEl.style.background = theme.bg;
  const container = $('#canvas-container');
  if (theme.bg === PAGE_COLORS.dark.bg) {
    container.style.background = '#0f0f14';
  } else if (theme.bg === PAGE_COLORS.white.bg) {
    container.style.background = '#e8e6df';
  } else {
    container.style.background = '';
  }
  document.documentElement.style.setProperty('--sb-thumb', theme.scrollbar);

/* ---------- Calendar ---------- */
async function loadMonthEntries() {
  state.monthEntries = new Set();
  if (!state.currentNotebookId) return;
  const y = state.viewMonth.getFullYear();
  const m = state.viewMonth.getMonth();
  const pages = await DB.pagesInMonth(state.currentNotebookId, y, m);
  state.monthEntries = new Set(pages.map(p => p.dateKey));
}
function renderCalendar() {
  const nb = state.notebooks.find(n => n.id === state.currentNotebookId);
  const label = $('#calendar-nb-label');
  if (nb) {
    label.querySelector('.nb-dot').style.background = nb.color;
    label.querySelector('.nb-text').textContent = nb.name;
  } else {
    label.querySelector('.nb-dot').style.background = 'transparent';
    label.querySelector('.nb-text').textContent = 'No notebook selected';
  }

  const y = state.viewMonth.getFullYear();
  const m = state.viewMonth.getMonth();
  $('#calendar-title').innerHTML = `${MONTHS[m]}<span class="year">${y}</span>`;

  const grid = $('#calendar-grid');
  grid.innerHTML = '';

  if (!state.currentNotebookId) {
    grid.style.display = 'none';
    let empty = document.getElementById('calendar-empty-state');
    if (!empty) {
      empty = document.createElement('div');
      empty.id = 'calendar-empty-state';
      empty.className = 'calendar-empty';
      empty.innerHTML = '<div class="calendar-empty-title">Create a notebook</div><div>Open the sidebar and tap + next to Notebooks to start journaling.</div>';
      grid.parentElement.appendChild(empty);
    }
    empty.style.display = 'block';
    return;
  } else {
    const empty = document.getElementById('calendar-empty-state');
    if (empty) empty.style.display = 'none';
    grid.style.display = 'grid';
  }

  const firstOfMonth = new Date(y, m, 1);
  const startWeekday = firstOfMonth.getDay();
  const daysInMonth = new Date(y, m + 1, 0).getDate();
  const daysInPrevMonth = new Date(y, m, 0).getDate();
  const today = new Date();

  const totalCells = Math.ceil((startWeekday + daysInMonth) / 7) * 7;

  for (let i = 0; i < totalCells; i++) {
    const cellIdx = i - startWeekday + 1;
    let cellDate, isOther = false;
    if (cellIdx < 1) {
      cellDate = new Date(y, m - 1, daysInPrevMonth + cellIdx);
      isOther = true;
    } else if (cellIdx > daysInMonth) {
      cellDate = new Date(y, m + 1, cellIdx - daysInMonth);
      isOther = true;
    } else {
      cellDate = new Date(y, m, cellIdx);
    }
    const dk = dateKey(cellDate);
    const cell = document.createElement('div');
    cell.className = 'cal-day' + (isOther ? ' other-month' : '');
    if (isSameDay(cellDate, today) && !isOther) cell.classList.add('today');
    if (!isOther && state.monthEntries.has(dk)) cell.classList.add('has-entry');

    const num = document.createElement('div');
    num.className = 'day-num';
    num.textContent = cellDate.getDate();
    cell.appendChild(num);

    if (!isOther) cell.addEventListener('click', () => openDateEntry(cellDate));
    grid.appendChild(cell);
  }
}
function changeMonth(delta) {
  state.viewMonth = new Date(state.viewMonth.getFullYear(), state.viewMonth.getMonth() + delta, 1);
  loadMonthEntries().then(renderCalendar);
}
function goToday() {
  state.viewMonth = new Date();
  loadMonthEntries().then(renderCalendar);
}
$('#btn-prev-month').addEventListener('click', () => changeMonth(-1));
$('#btn-next-month').addEventListener('click', () => changeMonth(1));
$('#btn-today').addEventListener('click', goToday);
$('#btn-sidebar-cal').addEventListener('click', () => {
  const app = $('#app');

  else app.classList.toggle('focus-mode');
});

/* ---------- Habits ----------
   A habits notebook has a list of `habits` (each with id + name) and an
   `entries` map keyed by `"<habitId>:<YYYY-MM-DD>"` storing the state for
   that day. States cycle: empty -> 'done' -> 'missed' -> empty.

   The main view is TODAY-FIRST: each habit is a card with a big tappable
   today button, a 7-day strip of recent history, and a streak counter.
   The full month and year heat-maps live in the Overview modal.
*/
const HABIT_STATES = ['', 'done', 'missed'];
const HABIT_ICONS = { '': '', done: '✓', missed: '✗' };

function getHabitState(nb, habitId, dk) {
  return (nb.entries && nb.entries[habitId + ':' + dk]) || '';
}
function setHabitState(nb, habitId, dk, st) {
  if (!nb.entries) nb.entries = {};
  const key = habitId + ':' + dk;
  if (!st) delete nb.entries[key]; else nb.entries[key] = st;
}
function computeStreak(nb, habitId) {
  // Current streak = consecutive 'done' days ending today (or yesterday if today blank).
  let streak = 0;
  const d = new Date();
  d.setHours(0, 0, 0, 0);
  if (getHabitState(nb, habitId, dateKey(d)) !== 'done') {
    d.setDate(d.getDate() - 1);
  }
  while (streak < 365) {
    if (getHabitState(nb, habitId, dateKey(d)) === 'done') {
      streak++;
      d.setDate(d.getDate() - 1);
    } else break;
  }
  return streak;
}

function renderHabits() {
  const nb = state.notebooks.find(n => n.id === state.currentNotebookId);
  if (!nb || nb.type !== 'habits') return;
  $('#habits-nb-label .nb-dot').style.background = nb.color;
  $('#habits-nb-label .nb-text').textContent = nb.name;

  const today = new Date();
  today.setHours(0, 0, 0, 0);
  const todayDK = dateKey(today);
  const fullDate = today.toLocaleDateString(undefined, { weekday: 'long', month: 'long', day: 'numeric' });
  $('#habits-title').textContent = 'Today';

  const root = $('#habits-scroll');
  root.innerHTML = '';

  if (!nb.habits || nb.habits.length === 0) {
    root.innerHTML = `
      <div class="habits-empty">
        <div class="habits-empty-title">Track your habits</div>
        <div>Add your first habit — like "exercise" or "take vitamins" — to start checking in daily.</div>
        <button class="modal-btn primary" id="habits-empty-add" style="margin-top:20px;">+ Add habit</button>
      </div>`;
    const addBtn = document.getElementById('habits-empty-add');
    if (addBtn) addBtn.addEventListener('click', addHabit);
    return;
  }

  // "Tuesday, April 22" label
  const dateEl = document.createElement('div');
  dateEl.className = 'habits-today-date';
  dateEl.textContent = fullDate;
  root.appendChild(dateEl);

  // Pre-compute last 7 day dates (oldest → today)
  const recentDates = [];
  for (let i = 6; i >= 0; i--) {
    const d = new Date(today);
    d.setDate(today.getDate() - i);
    recentDates.push(d);
  }
  const weekdayShort = ['S','M','T','W','T','F','S'];

  const cardsGrid = document.createElement('div');
  cardsGrid.className = 'habits-cards-grid';
  root.appendChild(cardsGrid);

  for (const habit of nb.habits) {
    const st = getHabitState(nb, habit.id, todayDK);
    const streak = computeStreak(nb, habit.id);
    const card = document.createElement('div');
    card.className = 'habit-card' + (st ? ' state-' + st : '');

    // top row: today button, name, streak, menu
    const top = document.createElement('div');
    top.className = 'habit-card-top';

    const todayBtn = document.createElement('div');
    todayBtn.className = 'habit-card-today';
    todayBtn.textContent = HABIT_ICONS[st] || '○';
    // Tap anywhere on the card (except menu) cycles today's state — the big
    // visible circle is just the strongest visual affordance for that.
    card.addEventListener('click', (e) => {
      if (e.target.closest('.habit-card-menu')) return;
      if (e.target.closest('.habit-strip-cell')) return;
      cycleHabitDay(habit.id, todayDK);
    });
    top.appendChild(todayBtn);

    const name = document.createElement('div');
    name.className = 'habit-card-name';
    name.textContent = habit.name;
    top.appendChild(name);

    if (streak > 0) {
      const streakEl = document.createElement('div');
      streakEl.className = 'habit-card-streak' + (streak >= 7 ? ' hot' : '');
      streakEl.textContent = `🔥 ${streak}d`;
      top.appendChild(streakEl);
    }

    const menu = document.createElement('button');
    menu.className = 'habit-card-menu';
    menu.title = 'Rename or delete';
    menu.textContent = '⋯';
    menu.addEventListener('click', (e) => { e.stopPropagation(); openHabitMenu(habit); });
    top.appendChild(menu);
    card.appendChild(top);

    // 7-day strip
    const strip = document.createElement('div');
    strip.className = 'habit-strip';
    const stripLabel = document.createElement('div');
    stripLabel.className = 'habit-strip-label';
    stripLabel.textContent = '7d';
    strip.appendChild(stripLabel);
    for (const d of recentDates) {
      const col = document.createElement('div');
      col.className = 'habit-strip-col';
      const cell = document.createElement('div');
      const cellDK = dateKey(d);
      const cellSt = getHabitState(nb, habit.id, cellDK);
      let cls = 'habit-strip-cell';
      if (isSameDay(d, today)) cls += ' today';
      if (cellSt) cls += ' ' + cellSt;
      cell.className = cls;
      cell.textContent = HABIT_ICONS[cellSt] || '';
      cell.style.cursor = 'pointer';
      cell.addEventListener('click', (e) => { e.stopPropagation(); cycleHabitDay(habit.id, cellDK); });
      col.appendChild(cell);
      const dateLabel = document.createElement('div');
      dateLabel.className = 'habit-strip-date';
      dateLabel.textContent = weekdayShort[d.getDay()];
      col.appendChild(dateLabel);
      strip.appendChild(col);
    }
    card.appendChild(strip);
    cardsGrid.appendChild(card);
  }

  // Footer button: View full month / year overview
  const footer = document.createElement('div');
  footer.className = 'habits-footer-actions';
  const viewBtn = document.createElement('button');
  viewBtn.className = 'habits-view-full-btn';
  viewBtn.textContent = 'View full month & year';
  viewBtn.addEventListener('click', openOverviewModal);
  footer.appendChild(viewBtn);
  root.appendChild(footer);
}

async function cycleHabitDay(habitId, dk) {
  const nb = state.notebooks.find(n => n.id === state.currentNotebookId);
  if (!nb) return;
  const current = getHabitState(nb, habitId, dk);
  const idx = HABIT_STATES.indexOf(current);
  const next = HABIT_STATES[(idx + 1) % HABIT_STATES.length];
  setHabitState(nb, habitId, dk, next);
  await DB.putNotebook(nb);
  renderHabits();
}

async function addHabit() {
  const nb = state.notebooks.find(n => n.id === state.currentNotebookId);
  if (!nb || nb.type !== 'habits') return;
  const name = await promptDialog({ title: 'New habit', placeholder: 'e.g. Exercise, Take vitamin D…', okLabel: 'Add' });
  if (!name) return;
  if (!Array.isArray(nb.habits)) nb.habits = [];
  nb.habits.push({ id: uid(), name: name.trim(), createdAt: Date.now() });
  nb.pageCount = nb.habits.length;
  await DB.putNotebook(nb);
  renderHabits();
  renderNotebooks();
}

async function openHabitMenu(habit) {
  const action = await actionDialog({
    title: habit.name,
    actions: [
      { label: 'Rename', value: 'rename' },
      { label: 'Delete', value: 'delete', destructive: true }
    ]
  });
  if (action === 'rename') {
    const newName = await promptDialog({ title: 'Rename habit', initial: habit.name, okLabel: 'Save' });
    if (newName && newName.trim()) {
      habit.name = newName.trim();
      const nb = state.notebooks.find(n => n.id === state.currentNotebookId);
      await DB.putNotebook(nb);
      renderHabits();
    }
  } else if (action === 'delete') {
    const ok = await confirmDialog({
      title: 'Delete habit?',
      message: `"${habit.name}" and all its check-ins will be deleted.`,
      okLabel: 'Delete'
    });
    if (!ok) return;
    const nb = state.notebooks.find(n => n.id === state.currentNotebookId);
    nb.habits = nb.habits.filter(h => h.id !== habit.id);
    if (nb.entries) {
      for (const k of Object.keys(nb.entries)) {
        if (k.startsWith(habit.id + ':')) delete nb.entries[k];
      }
    }
    nb.pageCount = nb.habits.length;
    await DB.putNotebook(nb);
    renderHabits();
    renderNotebooks();
  }
}

/* ---------- Overview modal (month + year heat maps, view-only) ---------- */
let overviewTab = 'month';
function openOverviewModal() {
  const nb = state.notebooks.find(n => n.id === state.currentNotebookId);
  if (!nb || nb.type !== 'habits' || !nb.habits || nb.habits.length === 0) {
    toast('Add at least one habit first');
    return;
  }
  $('#overview-title').textContent = nb.name + ' — Overview';
  overviewTab = 'month';
  $$('#overview-modal .overview-tab').forEach(b => b.classList.toggle('active', b.dataset.tab === 'month'));
  renderOverview();
  $('#overview-modal').classList.add('show');
}
function $$(sel) { return Array.from(document.querySelectorAll(sel)); }

function renderOverview() {
  const nb = state.notebooks.find(n => n.id === state.currentNotebookId);
  if (!nb) return;
  const content = $('#overview-content');
  content.innerHTML = '';
  for (const habit of nb.habits) {
    const block = document.createElement('div');
    block.className = 'overview-habit-block';
    const header = document.createElement('div');
    header.className = 'overview-habit-header';
    const stats = overviewStats(nb, habit.id, overviewTab);
    header.innerHTML = `
      <span class="overview-habit-name">${escapeHTML(habit.name)}</span>
      <span class="overview-habit-stats">${stats}</span>`;
    block.appendChild(header);
    if (overviewTab === 'month') block.appendChild(renderMonthGrid(nb, habit.id));
    else block.appendChild(renderYearGrid(nb, habit.id));
    content.appendChild(block);
  }
}

function overviewStats(nb, habitId, tab) {
  const today = new Date(); today.setHours(0,0,0,0);
  let start, label;
  if (tab === 'month') {
    start = new Date(today.getFullYear(), today.getMonth(), 1);
    label = 'this month';
  } else {
    start = new Date(today); start.setDate(today.getDate() - 364);
    label = 'last 12 months';
  }
  let done = 0, missed = 0, daysElapsed = 0;
  const d = new Date(start);
  while (d <= today) {
    const st = getHabitState(nb, habitId, dateKey(d));
    if (st === 'done') done++;
    else if (st === 'missed') missed++;
    daysElapsed++;
    d.setDate(d.getDate() + 1);
  }
  const rate = daysElapsed > 0 ? Math.round((done / daysElapsed) * 100) : 0;
  return `${done}/${daysElapsed} days done (${rate}%) ${label}`;
}

function renderMonthGrid(nb, habitId) {
  const today = new Date(); today.setHours(0,0,0,0);
  const y = today.getFullYear(), m = today.getMonth();
  const first = new Date(y, m, 1);
  const daysInMonth = new Date(y, m + 1, 0).getDate();
  const grid = document.createElement('div');
  grid.className = 'overview-month-grid';
  const weekdays = ['S','M','T','W','T','F','S'];
  for (const w of weekdays) {
    const h = document.createElement('div');
    h.className = 'overview-month-weekday';
    h.textContent = w;
    grid.appendChild(h);
  }
  // Leading blanks
  for (let i = 0; i < first.getDay(); i++) {
    const blank = document.createElement('div');
    blank.className = 'overview-month-cell empty';
    grid.appendChild(blank);
  }
  for (let day = 1; day <= daysInMonth; day++) {
    const d = new Date(y, m, day);
    const dk = dateKey(d);
    const st = getHabitState(nb, habitId, dk);
    const cell = document.createElement('div');
    let cls = 'overview-month-cell';
    if (st) cls += ' ' + st;
    if (isSameDay(d, today)) cls += ' today';
    cell.className = cls;
    cell.textContent = day;
    cell.title = dk + (st ? ': ' + st : '');
    grid.appendChild(cell);
  }
  return grid;
}

function renderYearGrid(nb, habitId) {
  const wrap = document.createElement('div');
  wrap.className = 'overview-year-wrap';
  const grid = document.createElement('div');
  grid.className = 'overview-year-grid';
  const today = new Date(); today.setHours(0,0,0,0);
  // Start on the Sunday 52 weeks ago (364 days back, then back to Sunday)
  const start = new Date(today);
  start.setDate(today.getDate() - 364);
  while (start.getDay() !== 0) start.setDate(start.getDate() - 1);
  const totalDays = Math.ceil((today - start) / 86400000) + 1;
  // Pad forward so the grid is complete columns
  const weeks = Math.ceil(totalDays / 7);
  const endIdx = weeks * 7;
  for (let i = 0; i < endIdx; i++) {
    const d = new Date(start);
    d.setDate(start.getDate() + i);
    const dk = dateKey(d);
    const st = getHabitState(nb, habitId, dk);
    const cell = document.createElement('div');
    let cls = 'overview-year-cell';
    if (d > today) cls += ' future';
    if (st) cls += ' ' + st;
    if (isSameDay(d, today)) cls += ' today';
    cell.className = cls;
    cell.title = dk + (st ? ': ' + st : '');
    grid.appendChild(cell);
  }
  wrap.appendChild(grid);
  // Month labels
  const labels = document.createElement('div');
  labels.className = 'overview-year-months';
  labels.style.display = 'grid';
  labels.style.gridTemplateColumns = `repeat(${weeks}, 14px)`;
  labels.style.gap = '3px';
  const monthNames = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  let lastMonth = -1;
  for (let w = 0; w < weeks; w++) {
    const d = new Date(start);
    d.setDate(start.getDate() + w * 7);
    const span = document.createElement('div');
    if (d.getMonth() !== lastMonth) {
      span.textContent = monthNames[d.getMonth()];
      lastMonth = d.getMonth();
    }
    labels.appendChild(span);
  }
  wrap.appendChild(labels);
  return wrap;
}

function openPageForEditing(page) {

/* ---------- Canvas (3-layer architecture) ----------
   #canvas-bg   ctxBg  — page background pattern + images (rarely redrawn)
   #canvas-ink  ctxInk — COMMITTED finished strokes (redrawn on scroll / new
                         stroke committed / erase / undo / redo / page switch)

                         selection UI (redrawn on every pointer event)

  const sx = scrollEl.scrollLeft;
  const sy = scrollEl.scrollTop;

  const vh = scrollEl.clientHeight;

  const format = currentPageFormat();

  ctxBg.save();
  ctxBg.setTransform(dpr, 0, 0, dpr, 0, 0);
  ctxBg.clearRect(0, 0, vw, vh);
  ctxBg.translate(-sx, -sy);

    ctxBg.strokeStyle = theme.rule;
    ctxBg.lineWidth = 1;

    const ROW = 28;
    const TOP_OFFSET = 80;
    const firstY = Math.max(TOP_OFFSET, Math.floor((sy - TOP_OFFSET) / ROW) * ROW + TOP_OFFSET);
    const lastY = sy + vh + ROW;

  const theme = currentPageTheme();
  const accentDark = theme.bg === PAGE_COLORS.dark.bg ? '#f5f1e8' : '#1a2847';

  ctx.lineWidth = 1.5;

/* ---------- Drawing interaction ---------- */
