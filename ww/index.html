    e.preventDefault();
    // If an image is already selected, check for handle hit first
    if (state.selectedImageId) {
      const sel = state.currentPage.images.find(i => i.id === state.selectedImageId);
      if (sel) {
        const h = getHandleAt(pt.x, pt.y, sel);
        if (h === 'delete') {
          deleteImage(sel.id);
          activePointerId = null;
          return;
        } else if (h) {
          imageAction = { type: 'resize', handle: h, startPt: pt, startImg: { ...sel } };
          return;
        }
      }
    }
    // Otherwise hit-test any image
    const hit = getImageAt(pt.x, pt.y);
    if (hit) {
      state.selectedImageId = hit.id;
      imageAction = { type: 'move', startPt: pt, startImg: { ...hit } };
      redraw();
    } else {
      // tap empty space = deselect
      if (state.selectedImageId) {
        state.selectedImageId = null;
        redraw();
      }
    }
    return;
  }

  // Deselect any image before drawing or erasing
  if (state.selectedImageId) {
    state.selectedImageId = null;
  }
  e.preventDefault();

  // Eraser: begin a stroke-level erase gesture
  // (S Pen side button toggles between pen and eraser via the contextmenu
  // handler far below — by the time we get here, `state.tool` already reflects
  // the user's choice.)
  if (state.tool === 'eraser') {
    erasing = { lastPt: pt, cursorPt: pt, deletedIds: new Set() };
    applyEraserAt(pt);
    redraw();
    return;
  }

  // Pen
  drawing = { id: uid(), tool: state.tool, color: state.color, size: state.thickness.size, points: [pt] };
  drawStrokeToViewport(drawing);
}

function pointerMove(e) {
  // ---- Track any active touch pointer's current position ----
  if (e.pointerType === 'touch' && activeTouches.has(e.pointerId)) {
    activeTouches.set(e.pointerId, { x: e.clientX, y: e.clientY });
    // Drive two-finger pan
    if (touchPan && activeTouches.size >= 2) {
      updateTouchPan();
      e.preventDefault();
      return;
    }
    // Single touch in pen-only mode: never scrolls anything. Just absorb.
    if (state.penOnly && state.tool !== 'select') {
      e.preventDefault();
      return;
    }
  }

  if (e.pointerId !== activePointerId) return;

  // image move / resize
  if (imageAction) {
    e.preventDefault();
    const pt = pointerToCanvas(e);
    const dx = pt.x - imageAction.startPt.x;
    const dy = pt.y - imageAction.startPt.y;
    const img = state.currentPage.images.find(i => i.id === state.selectedImageId);
    if (!img) return;
    const start = imageAction.startImg;
    if (imageAction.type === 'move') {
      img.x = Math.max(0, start.x + dx);
      img.y = Math.max(0, start.y + dy);
    } else {
      // proportional resize from opposite corner
      const aspect = start.w / start.h;
      const MIN = 40;
      let newW = start.w, newH = start.h, newX = start.x, newY = start.y;
      if (imageAction.handle === 'se') {
        newW = Math.max(MIN, start.w + dx);
        newH = newW / aspect;
      } else if (imageAction.handle === 'ne') {
        newW = Math.max(MIN, start.w + dx);
        newH = newW / aspect;
        newY = start.y + start.h - newH;
      } else if (imageAction.handle === 'sw') {
        newW = Math.max(MIN, start.w - dx);
        newH = newW / aspect;
        newX = start.x + start.w - newW;
      } else if (imageAction.handle === 'nw') {
        newW = Math.max(MIN, start.w - dx);
        newH = newW / aspect;
        newX = start.x + start.w - newW;
        newY = start.y + start.h - newH;
      }
      img.x = newX; img.y = newY; img.w = newW; img.h = newH;
    }
    redraw();
    return;
  }

  // Eraser sweep: hit-test along the path from last point to current, then redraw
  if (erasing) {
    e.preventDefault();
    const pt = pointerToCanvas(e);
    const dx = pt.x - erasing.lastPt.x, dy = pt.y - erasing.lastPt.y;
    const dist = Math.sqrt(dx * dx + dy * dy);
    const r = eraserRadius();
    const steps = Math.max(1, Math.ceil(dist / (r * 0.7)));
    for (let i = 1; i <= steps; i++) {
      const t = i / steps;
      applyEraserAt({ x: erasing.lastPt.x + dx * t, y: erasing.lastPt.y + dy * t });
    }
    erasing.lastPt = pt;
    erasing.cursorPt = pt;
    redraw();
    return;
  }

  // normal stroke extension
  if (!drawing) return;
  e.preventDefault();

  // Recover any intermediate points the browser coalesced between events.
  // On devices where pointer events fire faster than JS can keep up, these
  // intermediate samples would otherwise be hidden from us — reading them
  // back gives us smoother curves.
  const events = (typeof e.getCoalescedEvents === 'function') ? e.getCoalescedEvents() : null;
  const samples = (events && events.length > 0) ? events : [e];
  let added = false;
  for (const ev of samples) {
    const p = pointerToCanvas(ev);
    const last = drawing.points[drawing.points.length - 1];
    const ddx = p.x - last.x, ddy = p.y - last.y;
    if (ddx*ddx + ddy*ddy < 1.5) continue;
    drawing.points.push(p);
    added = true;
  }
  if (!added) return;
  // Repaint the overlay with the current in-progress stroke. The committed
  // ink layer is untouched — no iteration over the page's stroke list.
  drawStrokeToViewport(drawing);
}

function pointerUp(e) {
  // Pen release tracking (runs even if this pointer wasn't the captured one)
  if (e.pointerType === 'pen') {
    setPenEngaged(false);
    lastPenContactTime = Date.now(); // guard window starts from lift, not from first contact
  }

  // Remove this touch from our active set. End pan if we drop below 2 fingers.
  if (e.pointerType === 'touch' && activeTouches.has(e.pointerId)) {
    activeTouches.delete(e.pointerId);
    try { canvas.releasePointerCapture(e.pointerId); } catch (_) {}
    if (touchPan && activeTouches.size < 2) endTouchPan();
    // Single touches in pen-only mode never had any interaction to commit.
    if (state.penOnly && state.tool !== 'select') {
      e.preventDefault();
      return;
    }
  }

  if (e.pointerId !== activePointerId) return;
  try { canvas.releasePointerCapture(e.pointerId); } catch (_) {}

  if (imageAction) {
    const img = state.currentPage.images.find(i => i.id === state.selectedImageId);
    if (img) {
      const start = imageAction.startImg;
      const moved = img.x !== start.x || img.y !== start.y || img.w !== start.w || img.h !== start.h;
      if (moved) {
        state.undoStack.push({
          type: 'updateImage',
          imageId: img.id,
          from: { x: start.x, y: start.y, w: start.w, h: start.h },
          to:   { x: img.x,   y: img.y,   w: img.w,   h: img.h }
        });
        state.redoStack = [];
        growDocIfNeeded(img.x + img.w, img.y + img.h);
        updateUndoRedoButtons();
        scheduleSave();
      }
    }
    imageAction = null;
    activePointerId = null;
    return;
  }

  // Finalize eraser gesture
  if (erasing) {
    const ids = erasing.deletedIds;
    if (ids.size > 0) {
      const removed = [];
      const remaining = [];
      for (const s of state.currentPage.strokes) {
        if (ids.has(s.id)) {
          delete s._deleted;
          removed.push(s);
        } else {
          remaining.push(s);
        }
      }
      state.currentPage.strokes = remaining;
      state.undoStack.push({ type: 'eraseStrokes', strokes: removed });
      state.redoStack = [];
      updateUndoRedoButtons();
      scheduleSave();
    }
    erasing = null;
    activePointerId = null;
    redraw();
    return;
  }

  if (!drawing) { activePointerId = null; return; }
  e.preventDefault();
  if (drawing.points.length > 0) {
    state.currentPage.strokes.push(drawing);
    state.undoStack.push({ type: 'addStroke', strokeId: drawing.id });
    state.redoStack = [];
    let maxX = 0, maxY = 0;
    for (const p of drawing.points) {
      if (p.x > maxX) maxX = p.x;
      if (p.y > maxY) maxY = p.y;
    }
    growDocIfNeeded(maxX, maxY);
    updateUndoRedoButtons();
    scheduleSave();
  }
  drawing = null;
  activePointerId = null;
  redraw();
}
canvas.addEventListener('pointerdown', pointerDown);
canvas.addEventListener('pointermove', pointerMove);
canvas.addEventListener('pointerup', pointerUp);
canvas.addEventListener('pointercancel', pointerUp);
canvas.addEventListener('pointerleave', (e) => {
  if ((drawing || erasing || imageAction) && e.pointerId === activePointerId) pointerUp(e);
  // If a tracked touch leaves, treat it as lifted so we release pan state cleanly.
  if (e.pointerType === 'touch' && activeTouches.has(e.pointerId)) pointerUp(e);
});
// ---- S Pen side button handling (Samsung Tab S6 Lite + Brave) ----
// On this device, pressing the S Pen side button fires ONLY a contextmenu event
// — the OS swallows all pointer events while the button is held, so true
// momentary hold-to-erase is physically impossible: the browser never sees
// the pen contact while the button is pressed.
//
// Behavior: the button toggles between pen and eraser, BUT only when the pen
// is hovering (not in contact with the screen). If the button is pressed while
// the pen is touching the screen — e.g. the user accidentally bumps it while
// writing — we ignore it. This is detected by tracking the most recent pen
// contact time: any contextmenu event within CONTACT_GUARD_MS of a pen contact
// is suppressed.
let lastPenContactTime = 0;
const CONTACT_GUARD_MS = 500;
canvas.addEventListener('contextmenu', (e) => {
  e.preventDefault();
  // Guard: ignore during an active drawing / erasing stroke (belt-and-braces).
  if (drawing || erasing) return;
  // Guard: ignore if the pen was touching the screen very recently — that
  // means the button press happened as part of a tap, not a hover.
  const timeSinceContact = Date.now() - lastPenContactTime;
  if (timeSinceContact < CONTACT_GUARD_MS) return;
  // Toggle tool.
  if (state.tool === 'eraser') {
    state.tool = 'pen';
    toast('Pen');
  } else {
    state.tool = 'eraser';
    toast('Eraser');
  }
  setActiveTool();
  updateTouchAction();
});

// Note: we deliberately do NOT treat pen HOVER as "active" — doing so would
// mean any nearby S Pen (even resting in a pen holder) would lock out two-finger
// pan. `penActive` is driven only by real contact events inside pointerDown /
// pointerUp. With two-finger pan as the scroll mechanism, palm rejection no
// longer needs hover awareness — single touches are simply ignored in pen-only
// mode, so a palm can't scroll the page even when penActive is false.

// Redraw and grow-check on scroll (throttled via rAF)
scrollEl.addEventListener('scroll', () => {
  if (scrollRAF) return;
  scrollRAF = requestAnimationFrame(() => {
    scrollRAF = null;
    redraw();
    growForScroll();
  });
}, { passive: true });

/* ---------- Undo / Redo ---------- */
function undo() {
  if (!state.currentPage || state.undoStack.length === 0) return;
  const action = state.undoStack.pop();
  if (action.type === 'addStroke') {
    const idx = state.currentPage.strokes.findIndex(s => s.id === action.strokeId);
    if (idx !== -1) { const [s] = state.currentPage.strokes.splice(idx, 1); state.redoStack.push({ type: 'addStroke', stroke: s }); }
  } else if (action.type === 'addImage') {
    const idx = state.currentPage.images.findIndex(i => i.id === action.imageId);
    if (idx !== -1) { const [img] = state.currentPage.images.splice(idx, 1); state.redoStack.push({ type: 'addImage', image: img }); }
    if (state.selectedImageId === action.imageId) state.selectedImageId = null;
  } else if (action.type === 'updateImage') {
    const img = state.currentPage.images.find(i => i.id === action.imageId);
    if (img) { img.x = action.from.x; img.y = action.from.y; img.w = action.from.w; img.h = action.from.h; state.redoStack.push(action); }
  } else if (action.type === 'deleteImage') {
    if (!state.currentPage.images) state.currentPage.images = [];
    state.currentPage.images.push(action.image);
    state.redoStack.push(action);
  } else if (action.type === 'eraseStrokes') {
    if (!state.currentPage.strokes) state.currentPage.strokes = [];
    for (const s of action.strokes) state.currentPage.strokes.push(s);
    state.redoStack.push(action);
  }
  updateUndoRedoButtons();
  scheduleSave();
  redraw();
}
function redo() {
  if (!state.currentPage || state.redoStack.length === 0) return;
  const action = state.redoStack.pop();
  if (action.type === 'addStroke') {
    state.currentPage.strokes.push(action.stroke);
    state.undoStack.push({ type: 'addStroke', strokeId: action.stroke.id });
  } else if (action.type === 'addImage') {
    if (!state.currentPage.images) state.currentPage.images = [];
    state.currentPage.images.push(action.image);
    state.undoStack.push({ type: 'addImage', imageId: action.image.id });
  } else if (action.type === 'updateImage') {
    const img = state.currentPage.images.find(i => i.id === action.imageId);
    if (img) { img.x = action.to.x; img.y = action.to.y; img.w = action.to.w; img.h = action.to.h; state.undoStack.push(action); }
  } else if (action.type === 'deleteImage') {
    const idx = state.currentPage.images.findIndex(i => i.id === action.image.id);
    if (idx !== -1) state.currentPage.images.splice(idx, 1);
    if (state.selectedImageId === action.image.id) state.selectedImageId = null;
    state.undoStack.push(action);
  } else if (action.type === 'eraseStrokes') {
    const ids = new Set(action.strokes.map(s => s.id));
    state.currentPage.strokes = (state.currentPage.strokes || []).filter(s => !ids.has(s.id));
    state.undoStack.push(action);
  }
  updateUndoRedoButtons();
  scheduleSave();
  redraw();
}
function updateUndoRedoButtons() {
  $('#btn-undo').disabled = !state.currentPage || state.undoStack.length === 0;
  $('#btn-redo').disabled = !state.currentPage || state.redoStack.length === 0;
}
$('#btn-undo').addEventListener('click', undo);
$('#btn-redo').addEventListener('click', redo);

/* ---------- Save ---------- */
function scheduleSave() { clearTimeout(state.saveTimer); state.saveTimer = setTimeout(() => flushSave(), 500); }
async function flushSave() {
  if (!state.currentPage) return;
  clearTimeout(state.saveTimer);
  state.currentPage.docWidth = state.docWidth;
  state.currentPage.docHeight = state.docHeight;
  const clean = {
    ...state.currentPage,
    images: (state.currentPage.images || []).map(({ _el, _loaded, _loading, ...rest }) => rest)
  };
  await DB.putPage(clean);
}

/* ---------- Toolbar ---------- */
function buildColors() {
  // Update the current-color trigger in the toolbar
  const currentEl = $('#current-swatch');
  if (currentEl) currentEl.style.background = state.color;

  // Populate the popover grid
  const pop = $('#color-popover');
  pop.innerHTML = '';
  PEN_COLORS.forEach(c => {
    const b = document.createElement('button');
    b.className = 'popover-swatch' + (c === state.color ? ' active' : '');
    b.style.background = c;
    b.title = c;
    b.addEventListener('click', (e) => {
      e.stopPropagation();
      state.color = c;
      state.tool = 'pen';
      setActiveTool();
      updateTouchAction();
      buildColors();
      closeColorPopover();
    });
    pop.appendChild(b);
  });
}

function positionColorPopover() {
  const trigger = $('#btn-colors');
  const pop = $('#color-popover');
  if (!trigger || !pop) return;
  const rect = trigger.getBoundingClientRect();
  // Show the popover below the trigger; fit it within the viewport horizontally.
  const margin = 8;
  const popRect = pop.getBoundingClientRect();
  let top = rect.bottom + 6;
  let left = rect.left;
  if (left + popRect.width + margin > window.innerWidth) {
    left = Math.max(margin, window.innerWidth - popRect.width - margin);
  }
  if (top + popRect.height + margin > window.innerHeight) {
    // fall back to above the trigger
    top = Math.max(margin, rect.top - popRect.height - 6);
  }
  pop.style.top = top + 'px';
  pop.style.left = left + 'px';
}
function openColorPopover() {
  const pop = $('#color-popover');
  pop.classList.add('show');
  // Position after it's rendered so we can measure
  requestAnimationFrame(positionColorPopover);
}
function closeColorPopover() {
  $('#color-popover').classList.remove('show');
}
function toggleColorPopover() {
  const pop = $('#color-popover');
  if (pop.classList.contains('show')) closeColorPopover();
  else openColorPopover();
}
document.addEventListener('click', (e) => {
  const pop = $('#color-popover');
  if (!pop.classList.contains('show')) return;
  if (e.target.closest('#color-popover') || e.target.closest('#btn-colors')) return;
  closeColorPopover();
});
window.addEventListener('resize', () => {
  if ($('#color-popover').classList.contains('show')) positionColorPopover();
});
$('#btn-colors').addEventListener('click', (e) => {
  e.stopPropagation();
  toggleColorPopover();
});
function buildThickness() {
  const el = $('#thickness');
  el.innerHTML = '';
  THICKNESSES.forEach(t => {
    const b = document.createElement('button');
    b.className = 'thickness-btn' + (t.label === state.thickness.label ? ' active' : '');
    b.title = t.label;

  });
}
function setActiveTool() {
  document.querySelectorAll('#tools .tool-btn').forEach(b => b.classList.toggle('active', b.dataset.tool === state.tool));
}
/* ---------- Palm rejection, pan scrolling, touch-action ----------
   Strategy: touch-action is ALWAYS 'none' on the canvas. The browser never
   pans on its own; we handle finger-scrolling ourselves in JS. This makes

   touches, cannot cause the page to scroll mid-stroke.
*/
let penActive = false;
let penReleaseTimer = null;

  if (engaged) {
    penActive = true;
    clearTimeout(penReleaseTimer);
  } else {
    clearTimeout(penReleaseTimer);
    penReleaseTimer = setTimeout(() => { penActive = false; }, PEN_RELEASE_GRACE_MS);
  }
}

  // Always none — we implement all pan/scroll logic ourselves in JS.
  canvas.style.touchAction = 'none';

});

/* ---------- Image insert ---------- */
$('#btn-image').addEventListener('click', () => {

  $('#image-input').click();
});
$('#image-input').addEventListener('change', (e) => {
  const f = e.target.files[0];
  if (!f) return;
  const reader = new FileReader();
  reader.onload = () => {
    const dataURL = reader.result;
    const img = new Image();
    img.onload = () => {
      const vw = scrollEl.clientWidth || 800;
      const targetW = Math.min(vw * 0.6, 900);
      const ratio = img.height / img.width;
      const w = targetW, h = targetW * ratio;
      const vx = scrollEl.scrollLeft + (scrollEl.clientWidth - w) / 2;
      const vy = scrollEl.scrollTop + (scrollEl.clientHeight - h) / 2;
      const record = {
        id: uid(),
        dataURL,
        x: Math.max(60, vx),
        y: Math.max(80, vy),
        w, h,
        _el: img,
        _loaded: true
      };
      if (!state.currentPage.images) state.currentPage.images = [];
      state.currentPage.images.push(record);
      state.undoStack.push({ type: 'addImage', imageId: record.id });
      state.redoStack = [];
      growDocIfNeeded(record.x + record.w, record.y + record.h);
      // auto-select new image and switch to select tool so user can reposition
      state.selectedImageId = record.id;
      state.tool = 'select';
      setActiveTool();
      updateTouchAction();
      updateUndoRedoButtons();
      scheduleSave();
      redraw();
      toast('Image added — drag to reposition');
    };
    img.src = dataURL;
  };
  reader.readAsDataURL(f);
  e.target.value = '';
});

//   type: 'notebook' — exportNotebook output    (single notebook)
$('#btn-import').addEventListener('click', () => {
  $('#import-file-input').click();
});
$('#import-file-input').addEventListener('change', async (e) => {
  const file = e.target.files && e.target.files[0];
  if (!file) return;
  // Reset the input so selecting the same file again re-triggers change
  e.target.value = '';
  let data;
  try {
    const text = await file.text();
    data = JSON.parse(text);
  } catch (err) {
    toast('Invalid file — must be a .json backup');
    console.error(err);
    return;
  }
  if (!data || typeof data !== 'object') {
    toast('Backup file is malformed');
    return;
  }
  const isFull = data.type === 'full' && Array.isArray(data.notebooks);
  const isSingle = data.type === 'notebook' && data.notebook && Array.isArray(data.pages);
  if (!isFull && !isSingle) {
    toast('Unrecognized backup format');
    return;
  }

  // Summarize what's about to be imported so the user can confirm
  let summary;
  if (isFull) {
    const totalPages = data.notebooks.reduce((n, nb) => n + (nb.pages ? nb.pages.length : 0), 0);
    summary = `${data.notebooks.length} notebook(s), ${totalPages} page(s)`;
  } else {
    summary = `"${data.notebook.name || 'Unnamed'}" — ${data.pages.length} page(s)`;
  }
  const ok = await confirmDialog({
    title: 'Import backup?',
    message: `Will add ${summary}. Existing notebooks with the same ID will be replaced; other notebooks keep their data.`,
    okLabel: 'Import'
  });
  if (!ok) return;

  try {
    if (isFull) {
      for (const nb of data.notebooks) {
        const pages = nb.pages || [];
        const nbCopy = { ...nb };
        delete nbCopy.pages;
        await DB.putNotebook(nbCopy);
        for (const p of pages) {
          await DB.putPage(p);
        }
      }
    } else {
      await DB.putNotebook(data.notebook);
      for (const p of data.pages) {
        await DB.putPage(p);
      }
    }
    await loadNotebooks();
    renderNotebooks();
    if (state.notebooks.length > 0) {
      await selectNotebook(state.notebooks[state.notebooks.length - 1].id);
    }
    toast('Import complete');
  } catch (err) {
    console.error(err);
    toast('Import failed — see error banner');
    throw err; // surface to the error overlay
  }
});

/* ---------- Version tap → force update ----------
   Tapping the version number prompts: force the service worker to fetch fresh
   code from the server. Useful when a redeploy isn't taking effect (installed
   PWAs hold on to cached HTML). Does NOT touch IndexedDB, so notebook data
   is preserved.
*/
$('#app-version').addEventListener('click', async () => {
  const ok = await confirmDialog({
    title: 'Check for updates?',
    message: 'This reloads the app to fetch the latest code from the server. Your notebooks are not affected.',
    okLabel: 'Reload'
  });
  if (!ok) return;
  try {
    if ('serviceWorker' in navigator) {
      const regs = await navigator.serviceWorker.getRegistrations();
      for (const r of regs) await r.unregister();
    }
    if ('caches' in window) {
      const names = await caches.keys();
      for (const n of names) await caches.delete(n);
    }
  } catch (err) { console.warn('Cache clear failed', err); }
  // Hard reload bypassing cache
  window.location.reload();
});

/* ---------- Keyboard ---------- */
window.addEventListener('keydown', (e) => {
  if (e.target.tagName === 'INPUT') return;
  if ((e.ctrlKey || e.metaKey) && e.key === 'z' && !e.shiftKey) { e.preventDefault(); undo(); }
  else if ((e.ctrlKey || e.metaKey) && (e.key === 'y' || (e.shiftKey && e.key === 'Z'))) { e.preventDefault(); redo(); }
  else if (e.key === 'e') { state.tool = 'eraser'; setActiveTool(); updateTouchAction(); }
  else if (e.key === 'p') { state.tool = 'pen'; setActiveTool(); updateTouchAction(); }
  else if (e.key === 'v' || e.key === 's') { state.tool = 'select'; setActiveTool(); updateTouchAction(); }
  else if (e.key === 'Delete' && state.selectedImageId) { deleteImage(state.selectedImageId); }
  else if (e.key === 'Escape') {
    if ($('#color-popover').classList.contains('show')) closeColorPopover();
    else if (!$('#writing-view').classList.contains('hidden')) $('#btn-back').click();
  }
});

/* ---------- Init ---------- */
async function init() {
  try { state.db = await openDB(); }
  catch (err) { alert('Could not open local storage. Please check browser settings.'); return; }

  await loadNotebooks();
  renderNotebooks();
  buildColors();
  buildThickness();
  updateTouchAction();
  updateBackupStatus();

  state.viewMonth = new Date();
  if (state.notebooks.length > 0) {
    await selectNotebook(state.notebooks[state.notebooks.length - 1].id);
  } else {
    renderCalendar();
  }

  function scheduleCanvasResize(delay) {
    clearTimeout(init._r);
    init._r = setTimeout(() => { if (!$('#writing-view').classList.contains('hidden')) resizeCanvas(); }, delay || 100);
  }
  window.addEventListener('resize', () => scheduleCanvasResize(100));
  // Orientation changes on mobile need a few attempts to catch the moment the
  // viewport has settled into its new dimensions.
  window.addEventListener('orientationchange', () => {
    scheduleCanvasResize(50);
    setTimeout(() => scheduleCanvasResize(0), 300);
    setTimeout(() => scheduleCanvasResize(0), 700);
  });
  document.addEventListener('visibilitychange', () => { if (document.hidden) flushSave(); });
  window.addEventListener('beforeunload', () => flushSave());

  // Run auto-backup check after everything is loaded. Deferred so it doesn't
  // block the first render — download is triggered a second or two into the
  // session if a weekly backup is due.
  setTimeout(() => { maybeAutoBackup(); }, 2000);
}
init();
